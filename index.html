<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title> Jomart's Store's Shop</title>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<header>
			<h1>Welcome to Jomart</h1>
		</header>

		<section id="products">
			<h2>Available Products</h2>
			<div id="product-list"></div>
		</section>

		<section id="cart">
			<h2>Cart</h2>
			<ul id="cart-items"></ul>
			<button id="checkout-button">Checkout</button>
		</section>

		<section id="populate">
			<h2>Reset Stock</h2>
			<button id="populate-products">Populate Databases</button>
		</section>

		<div id="message"></div>

		<script src="app.js"></script>

	</body>
</html>
